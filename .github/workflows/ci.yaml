name: CI Build

permissions:
  contents: read
  actions: read

on:
  pull_request:
    branches:
      - main
    paths-ignore: # 文档更新不必触发 CI
      - "**.md"
      - "readme/**"
  push:
    branches:
      - main
    paths-ignore: # 文档更新不必触发 CI
      - "**.md"
      - "readme/**"

jobs:
  # 先计算符合语义化版本的 CI 预发布版本，再把结果传给复用构建流程。
  prepare-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Compute CI version
        id: version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/ci_version.py \
            --repo "${{ github.repository }}" \
            --workflow-file "ci.yaml" \
            --current-run-id "${{ github.run_id }}" \
            --current-run-number "${{ github.run_number }}" \
            --fallback-version "${{ github.sha }}"

  # 跑 pytest。这些测试只做静态解析（AST + ruamel），不 import 项目代码，
  # 所以跟平台无关，放在 ubuntu 上跑最快最省。用 --no-project 跳过整套项目依赖
  # （否则 uv 会去装 pywin32 这类 Windows-only 包，在 Linux 上必然失败），
  # 只临时拉测试真正需要的 pytest + ruamel.yaml。
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Setup UV for Python
        uses: astral-sh/setup-uv@v8.1.0

      - name: Run pytest
        run: uv run --no-project --python 3.12 --with pytest --with "ruamel.yaml" pytest -ra

  # 复用既有打包流程，只替换传入的构建版本号。测试不过就不打包。
  build:
    needs: [prepare-version, test]
    uses: ./.github/workflows/reusable-build.yml
    with:
      version: ${{ needs.prepare-version.outputs.version }}
